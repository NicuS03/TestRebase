
# This is a basic workflow to help you get started with Actions

name: CI

permissions:
  contents: read
  id-token: write

# Controls when the workflow will run
on:
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - name: Generate Cloudsmith OIDC Token
        uses: cloudsmith-io/cloudsmith-cli-action@dbeb7b69746286974aab4a39a9f369a4fd0d5334 #v1.0.5
        with:
          oidc-namespace: adi
          oidc-service-slug: nicu-siderias
      
      - name: Push package to Cloudsmith (Non-Windows)
        run: |
          for file in . do
            echo "Processing file: $file"
            cloudsmith push raw adi/u-boot-test2 $file
          done
