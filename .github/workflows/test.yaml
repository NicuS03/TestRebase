name: CI


# Controls when the workflow will run
on:
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: arm64v8/debian:trixie
    steps:
      - name: Test Cloudsmith
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/adi/kuiper/setup.deb.sh' | sudo -E bash
          sudo apt-get update
          sudo apt-get install libad9361
