name: CI

permissions:
  contents: read
  id-token: write

# Controls when the workflow will run
on:
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Start persistent container
        run: |
          docker run -d \
            arm64 \
            --name test-arm64
      
      - name: Push package to Cloudsmith (Non-Windows)
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/adi/kuiper/setup.deb.sh' | sudo -E bash
          sudo apt-get update
          sudo apt-get install libad9361
